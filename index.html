<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GearList">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>GearList</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS — Dracula-inspired teal/cyan palette
═══════════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg:       #0d1117;
  --surf:     #161b22;
  --surf2:    #1c2333;
  --surf3:    #21262d;
  --surf4:    #2d333b;
  /* Borders */
  --div:      #21262d;
  --bdr:      #30363d;
  --bdr2:     #484f58;
  /* Text */
  --tx:       #e6edf3;
  --txm:      #8b949e;
  --txf:      #484f58;
  /* Brand — Cyan/Teal */
  --cyan:     #39d0d8;
  --cyan2:    #22b8c0;
  --cyan3:    #0d9aa1;
  --cyanb:    rgba(57,208,216,.12);
  --cyanglow: 0 0 20px rgba(57,208,216,.25);
  /* Semantic */
  --ok:       #56d364;
  --okb:      rgba(86,211,100,.12);
  --okglow:   0 0 16px rgba(86,211,100,.2);
  --warn:     #e3b341;
  --warnb:    rgba(227,179,65,.12);
  --err:      #f85149;
  --errb:     rgba(248,81,73,.1);
  --purple:   #bc8cff;
  /* Radius */
  --r6: 6px; --r10:10px; --r14:14px; --r18:18px; --r24:24px; --r99:99px;
  /* Spacing */
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
  --nav-h: 62px;
  /* Font */
  --font: 'Inter',system-ui,-apple-system,sans-serif;
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%;touch-action:manipulation}
body{
  font-family:var(--font);background:var(--bg);color:var(--tx);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overscroll-behavior:none;
}
button,input{font:inherit;color:inherit;background:none;border:none;outline:none;-webkit-appearance:none;appearance:none}
button{cursor:pointer;touch-action:manipulation}

/* ═══════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════ */
#app{
  display:flex;flex-direction:column;
  height:100dvh;height:100vh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bot);
  overflow:hidden;
}

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:var(--surf);
  border-bottom:1px solid var(--div);
  position:relative;z-index:10;
}
/* Accent line top */
.topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--purple),var(--cyan));
  background-size:200%;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:36px;height:36px;border-radius:var(--r10);
  background:linear-gradient(135deg,var(--cyan3),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 0 12px rgba(57,208,216,.3);
}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(90deg,var(--cyan),#a5d6f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-size:11px;color:var(--txm);margin-top:1px;font-weight:500}
.top-btn{
  width:36px;height:36px;border-radius:var(--r10);
  background:var(--surf3);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  color:var(--txm);
}
.top-btn:active{background:var(--cyanb);border-color:var(--cyan);color:var(--cyan);transform:scale(.9)}

/* ═══════════════════════════════════════════════
   SCROLL AREA
═══════════════════════════════════════════════ */
.scroll{
  flex:1;overflow-y:scroll;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding:14px 14px 20px;
}
.scroll::-webkit-scrollbar{display:none}

/* ═══════════════════════════════════════════════
   STATS CARDS
═══════════════════════════════════════════════ */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--r14);padding:13px 8px;text-align:center;
  position:relative;overflow:hidden;
}
.stat::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);
  pointer-events:none;
}
.stat-n{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.03em}
.n-ok{color:var(--ok);text-shadow:0 0 12px rgba(86,211,100,.4)}
.n-cy{color:var(--cyan);text-shadow:0 0 12px rgba(57,208,216,.4)}
.n-wa{color:var(--warn);text-shadow:0 0 12px rgba(227,179,65,.3)}
.stat-l{font-size:10px;color:var(--txm);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* ═══════════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════════ */
.prog-wrap{margin-bottom:14px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r14);padding:12px 14px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-label{font-size:12px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.06em}
.prog-pct{font-size:14px;font-weight:800;color:var(--cyan)}
.prog-bg{height:8px;background:var(--surf4);border-radius:var(--r99);overflow:hidden}
.prog-fill{
  height:100%;border-radius:var(--r99);
  background:linear-gradient(90deg,var(--cyan3),var(--cyan));
  transition:width .5s cubic-bezier(.16,1,.3,1);
  box-shadow:0 0 8px rgba(57,208,216,.4);
}
.prog-fill.done{background:linear-gradient(90deg,#2dbe4a,var(--ok));box-shadow:0 0 8px rgba(86,211,100,.4)}

/* ═══════════════════════════════════════════════
   FILTER TABS
═══════════════════════════════════════════════ */
.tabs{
  display:flex;gap:6px;margin-bottom:16px;
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--r14);padding:4px;
}
.tab{
  flex:1;padding:9px 6px;border-radius:var(--r10);
  font-size:12px;font-weight:700;color:var(--txm);
  text-align:center;letter-spacing:.01em;
}
.tab.on{
  background:linear-gradient(135deg,var(--cyan3),var(--cyan2));
  color:#0d1117;font-weight:800;
  box-shadow:0 2px 8px rgba(57,208,216,.3);
}
.tab:active:not(.on){background:var(--surf3);color:var(--tx)}

/* ═══════════════════════════════════════════════
   SECTION BLOCK
═══════════════════════════════════════════════ */
.sec-block{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--r18);margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.sec-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 14px 10px;
  border-bottom:1px solid var(--div);
}
.sec-emoji-wrap{
  width:38px;height:38px;border-radius:var(--r10);
  background:var(--cyanb);border:1px solid rgba(57,208,216,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;
}
.sec-info{flex:1;min-width:0}
.sec-name{font-size:14px;font-weight:700;letter-spacing:-.01em;line-height:1.2}
.sec-meta{font-size:11px;color:var(--txm);margin-top:2px;font-weight:500}
.sec-prog-bar{height:3px;background:var(--surf4);border-radius:var(--r99);margin-top:6px;overflow:hidden}
.sec-prog-fill{height:100%;background:var(--cyan);border-radius:var(--r99);transition:width .3s ease}
.sec-badge{
  font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:var(--r99);
  background:var(--cyanb);border:1px solid rgba(57,208,216,.2);
  color:var(--cyan);white-space:nowrap;flex-shrink:0;
}
.sec-badge.complete{background:var(--okb);border-color:rgba(86,211,100,.2);color:var(--ok)}
.sec-del{
  width:30px;height:30px;border-radius:var(--r10);
  display:flex;align-items:center;justify-content:center;
  color:var(--txf);flex-shrink:0;
}
.sec-del:active{background:var(--errb);color:var(--err);transform:scale(.88)}

.sec-items{padding:8px 10px 10px}

/* ═══════════════════════════════════════════════
   ITEM ROW
═══════════════════════════════════════════════ */
.item{
  display:flex;align-items:center;gap:10px;
  padding:11px 10px;
  border-radius:var(--r10);margin-bottom:4px;
  border:1px solid transparent;
  background:var(--surf2);
  position:relative;
  transition:background .12s,border-color .12s;
}
.item:last-of-type{margin-bottom:0}
.item.done{background:var(--okb);border-color:rgba(86,211,100,.2)}
.item:active{opacity:.75}

/* Checkbox */
.chk{
  width:24px;height:24px;min-width:24px;border-radius:7px;
  border:2px solid var(--bdr2);
  display:flex;align-items:center;justify-content:center;
  background:var(--surf3);flex-shrink:0;pointer-events:none;
}
.item.done .chk{
  background:var(--ok);border-color:var(--ok);
  box-shadow:0 0 8px rgba(86,211,100,.35);
}
.chk-svg{opacity:0;transform:scale(.3) rotate(-15deg);transition:all .18s cubic-bezier(.16,1,.3,1)}
.item.done .chk-svg{opacity:1;transform:scale(1) rotate(0)}

.iinfo{flex:1;min-width:0;pointer-events:none}
.iname{font-size:13.5px;font-weight:600;line-height:1.3}
.item.done .iname{color:var(--txm);text-decoration:line-through;text-decoration-color:var(--txf)}
.inote{font-size:11px;color:var(--txf);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Qty control */
.qty{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qb{
  width:28px;height:28px;border-radius:50%;
  background:var(--surf4);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;line-height:1;color:var(--txm);
  flex-shrink:0;
}
.qb:active{background:var(--cyan);color:#0d1117;border-color:var(--cyan);transform:scale(.85)}
.qv{min-width:20px;text-align:center;font-size:13px;font-weight:800;color:var(--tx)}

.idel{
  width:26px;height:26px;flex-shrink:0;
  border-radius:var(--r6);display:flex;align-items:center;justify-content:center;
  color:var(--txf);
}
.idel:active{color:var(--err);background:var(--errb);transform:scale(.88)}

/* ═══════════════════════════════════════════════
   ADD ITEM ROW
═══════════════════════════════════════════════ */
.add-row{
  display:flex;gap:6px;padding:8px 10px;
  background:var(--surf3);border-radius:var(--r10);
  border:1.5px dashed var(--bdr);
  margin-top:8px;
}
.add-inp{
  flex:1;font-size:13px;background:transparent;
  color:var(--tx);caret-color:var(--cyan);min-width:0;
  font-weight:500;
}
.add-inp::placeholder{color:var(--txf);font-weight:400}
.add-go{
  background:linear-gradient(135deg,var(--cyan3),var(--cyan2));
  color:#0d1117;border-radius:var(--r10);
  padding:7px 14px;font-size:12px;font-weight:800;
  flex-shrink:0;letter-spacing:.01em;
}
.add-go:active{transform:scale(.92);opacity:.85}

/* ═══════════════════════════════════════════════
   BOTTOM ACTION BUTTONS
═══════════════════════════════════════════════ */
.action-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px}

.btn-add-cat{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:15px;border-radius:var(--r14);
  background:var(--cyanb);
  border:1.5px dashed rgba(57,208,216,.4);
  color:var(--cyan);font-size:14px;font-weight:700;
  letter-spacing:.01em;
}
.btn-add-cat:active{background:rgba(57,208,216,.2);transform:scale(.98)}

.btn-reset{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:13px;border-radius:var(--r14);
  border:1px solid var(--bdr);
  color:var(--txm);font-size:13px;font-weight:600;
  background:var(--surf);
}
.btn-reset:active{border-color:var(--err);color:var(--err);background:var(--errb)}

/* ═══════════════════════════════════════════════
   EMPTY
═══════════════════════════════════════════════ */
.empty{
  text-align:center;padding:52px 24px;color:var(--txm);
}
.empty-ei{font-size:52px;margin-bottom:14px}
.empty h3{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.6;color:var(--txm)}
.empty-filter{text-align:center;padding:24px;color:var(--txf);font-size:13px}

/* ═══════════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════════ */
.bnav{
  flex-shrink:0;height:var(--nav-h);
  display:flex;gap:4px;padding:6px 10px;
  background:var(--surf);border-top:1px solid var(--div);
}
.bn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border-radius:var(--r14);
  font-size:10px;font-weight:700;color:var(--txm);
  text-transform:uppercase;letter-spacing:.05em;
  padding:6px 4px;
}
.bn.on{background:var(--cyanb);color:var(--cyan)}
.bn:active:not(.on){background:var(--surf3);color:var(--tx)}
.bn-ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center}

/* ═══════════════════════════════════════════════
   HISTORY PAGE
═══════════════════════════════════════════════ */
#pg-hist{display:none;flex-direction:column;height:100%;overflow:hidden}
#pg-hist.on{display:flex}
.hist-scroll{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:14px 14px 20px}
.hist-scroll::-webkit-scrollbar{display:none}

/* Day card */
.day-card{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:var(--r18);margin-bottom:10px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.day-head{
  display:flex;align-items:center;gap:12px;
  padding:14px 14px;cursor:pointer;user-select:none;
}
.day-head:active{background:var(--surf3)}
.day-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  background:var(--bdr2);
}
.day-dot.today{background:var(--cyan);box-shadow:0 0 8px rgba(57,208,216,.5)}
.day-dot.full{background:var(--ok);box-shadow:0 0 8px rgba(86,211,100,.4)}
.day-info{flex:1;min-width:0}
.day-date-main{font-size:14px;font-weight:700;color:var(--tx)}
.day-date-sub{font-size:11px;color:var(--txm);margin-top:1px;font-weight:500}
.day-right{text-align:right;flex-shrink:0}
.day-pct{font-size:15px;font-weight:800;color:var(--cyan)}
.day-pct.done{color:var(--ok)}
.day-count{font-size:10px;color:var(--txm);margin-top:1px;font-weight:500}
.day-chev{color:var(--txf);flex-shrink:0;transition:transform .2s}
.day-chev.open{transform:rotate(180deg)}

.day-prog{height:3px;background:var(--surf4);overflow:hidden}
.day-prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan3),var(--cyan));transition:width .3s}
.day-prog-fill.done{background:linear-gradient(90deg,#2dbe4a,var(--ok))}

.day-body{display:none;border-top:1px solid var(--div)}
.day-body.open{display:block}

/* Section inside history */
.hsec{padding:10px 14px 12px}
.hsec-title{
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:700;color:var(--txm);
  text-transform:uppercase;letter-spacing:.06em;
  padding:4px 0 8px;
  border-bottom:1px solid var(--div);
  margin-bottom:6px;
}
.hitem{
  display:flex;align-items:center;gap:8px;
  padding:7px 0;border-bottom:1px solid rgba(33,38,45,.8);
  font-size:13px;
}
.hitem:last-child{border-bottom:none}
.hchk{
  width:18px;height:18px;border-radius:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bdr2);background:var(--surf3);
}
.hchk.ok{background:var(--ok);border-color:var(--ok);box-shadow:0 0 6px rgba(86,211,100,.3)}
.hitem-name{flex:1;color:var(--tx);font-weight:500}
.hitem-note{font-size:11px;color:var(--txf)}
.hitem-qty{
  font-size:11px;font-weight:700;color:var(--txm);
  background:var(--surf4);padding:2px 7px;border-radius:var(--r99);
  white-space:nowrap;
}

/* ═══════════════════════════════════════════════
   BOTTOM SHEET
═══════════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.overlay.on{opacity:1;pointer-events:all}
.sheet{
  background:var(--surf);
  border-radius:var(--r24) var(--r24) 0 0;
  border-top:1px solid var(--bdr);
  width:100%;max-width:520px;
  padding:20px 18px calc(24px + var(--safe-bot));
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.16,1,.3,1);
  max-height:82dvh;overflow-y:auto;
}
.overlay.on .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--bdr);border-radius:var(--r99);margin:0 auto 20px}
.sh-title{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:16px;
  background:linear-gradient(90deg,var(--cyan),#a5d6f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sh-inp{
  width:100%;background:var(--surf3);
  border:1.5px solid var(--bdr);border-radius:var(--r14);
  padding:13px 15px;font-size:16px;font-weight:500;
  color:var(--tx);margin-bottom:14px;
  -webkit-appearance:none;
  transition:border-color .15s;
}
.sh-inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(57,208,216,.1)}
.sh-label{font-size:11px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.emojis{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.eb{
  width:44px;height:44px;border-radius:var(--r10);font-size:22px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surf3);border:2px solid transparent;
}
.eb.on{border-color:var(--cyan);background:var(--cyanb);box-shadow:0 0 8px rgba(57,208,216,.2)}
.eb:active{transform:scale(.82)}
.sh-btns{display:flex;gap:10px}
.sh-cancel{
  flex:1;padding:14px;border-radius:var(--r14);
  border:1.5px solid var(--bdr);font-size:14px;font-weight:700;color:var(--txm);
  background:var(--surf3);
}
.sh-cancel:active{background:var(--surf4)}
.sh-ok{
  flex:2;padding:14px;border-radius:var(--r14);
  background:linear-gradient(135deg,var(--cyan3),var(--cyan2));
  color:#0d1117;font-size:14px;font-weight:800;
  box-shadow:0 4px 14px rgba(57,208,216,.3);
}
.sh-ok:active{opacity:.85;transform:scale(.97)}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
.toast{
  position:fixed;
  bottom:calc(var(--nav-h) + 14px + var(--safe-bot));
  left:50%;transform:translateX(-50%) translateY(12px);

/* ════════════════════════════════════════
   INDEXEDDB
════════════════════════════════════════ */
let db = null;
function openDB() {
  return new Promise(res => {
    try {
      const req = indexedDB.open('GearListDB', 4);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('history'))
          d.createObjectStore('history', { keyPath: 'date' });
      };
      req.onsuccess = e => { db = e.target.result; res(); };
      req.onerror = () => res();
    } catch(e) { res(); }
  });
}
function dbGet(store, key) {
  return new Promise(res => {
    if (!db) return res(null);
    try { const r = db.transaction(store,'readonly').objectStore(store).get(key); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }
    catch(e) { res(null); }
  });
}
function dbGetAll(store) {
  return new Promise(res => {
    if (!db) return res([]);
    try { const r = db.transaction(store,'readonly').objectStore(store).getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>res([]); }
    catch(e) { res([]); }
  });
}
function dbPut(store, val) {
  return new Promise(res => {
    if (!db) return res();
    try { const r = db.transaction(store,'readwrite').objectStore(store).put(val); r.onsuccess=()=>res(); r.onerror=()=>res(); }
    catch(e) { res(); }
  });
}

/* ════════════════════════════════════════

════════════════════════════════════════ */

const DEFAULT = [

/* ════════════════════════════════════════
   LOAD / SAVE
════════════════════════════════════════ */
async function loadToday() {
  const rec = await dbGet('history', TODAY);
  if (rec && rec.sections) {
    secs = rec.sections;
  } else {
    secs = DEFAULT.map(s => ({ ...s, items: s.items.map(i => ({...i, done: false})) }));
  }
}
async function saveToday() {
  await dbPut('history', { date: TODAY, sections: secs, ts: Date.now() });
}

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
function render() {
  const area = document.getElementById('items-area');
  if (!area) return;

  let totalItems=0, doneItems=0, allQty=0;
  secs.forEach(s => {
    totalItems += s.items.length;
    doneItems += s.items.filter(i => i.done).length;
    allQty += s.items.reduce((a,i) => a + i.qty, 0);
  });

  const pct = totalItems ? Math.round(doneItems/totalItems*100) : 0;
  const el = id => document.getElementById(id);
  if(el('s-done')) el('s-done').textContent = doneItems;
  if(el('s-total')) el('s-total').textContent = totalItems;
  if(el('s-qty')) el('s-qty').textContent = allQty;
  if(el('prog-pct')) el('prog-pct').textContent = pct + '%';
  if(el('prog-fill')) {
    el('prog-fill').style.width = pct + '%';
    el('prog-fill').className = 'prog-fill' + (pct===100?' done':'');
  }

  if (secs.length === 0) {
    area.innerHTML = '<div class="empty"><div class="empty-ei">🎬</div><h3>Chưa có danh mục nào</h3><p>Nhấn nút + ở góc trên phải để bắt đầu tạo danh mục thiết bị</p></div>';
    return;
  }

  let html = '';
  let hasAny = false;

  secs.forEach(sec => {
    const filtered = sec.items.filter(i => {
      if (curTab === 'pending') return !i.done;
      if (curTab === 'done') return i.done;
      return true;
    });
    if (curTab !== 'all' && filtered.length === 0) return;
    hasAny = true;

    const secDone = sec.items.filter(i => i.done).length;
    const secTotal = sec.items.length;
    const secPct = secTotal ? Math.round(secDone/secTotal*100) : 0;
    const isComplete = secDone === secTotal && secTotal > 0;

    html += `<div class="sec-block">
      <div class="sec-header">
        <div class="sec-emoji-wrap">${sec.icon}</div>
        <div class="sec-info">
          <div class="sec-name">${esc(sec.title)}</div>
          <div class="sec-meta">${secDone} / ${secTotal} thiết bị đã chuẩn bị</div>
          <div class="sec-prog-bar"><div class="sec-prog-fill" style="width:${secPct}%"></div></div>
        </div>
        <div class="${'sec-badge'+(isComplete?' complete':'')}">${isComplete?'✓ Xong':secDone+'/'+secTotal}</div>
        <button class="sec-del" data-action="delsec" data-sid="${sec.id}" aria-label="Xoá danh mục">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>
      <div class="sec-items">`;

    filtered.forEach(item => {
      html += `<div class="item${item.done?' done':''}" data-action="toggle" data-sid="${sec.id}" data-iid="${item.id}">
        <div class="chk">
          <svg class="chk-svg" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <div class="iinfo">
          <div class="iname">${esc(item.name)}</div>
          ${item.note?`<div class="inote">${esc(item.note)}</div>`:''}
        </div>
        <div class="qty" data-noprop="1">
          <button class="qb" data-action="qty" data-sid="${sec.id}" data-iid="${item.id}" data-d="-1">−</button>
          <span class="qv">${item.qty}</span>
          <button class="qb" data-action="qty" data-sid="${sec.id}" data-iid="${item.id}" data-d="1">+</button>
        </div>
        <button class="idel" data-action="delitem" data-sid="${sec.id}" data-iid="${item.id}" aria-label="Xoá">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>`;
    });

    if (curTab === 'all') {
      html += `<div class="add-row">
        <input class="add-inp" data-sid="${sec.id}" placeholder="Thêm thiết bị vào danh mục này..." maxlength="50" autocomplete="off" autocorrect="off">
        <button class="add-go" data-action="additem" data-sid="${sec.id}">+ Thêm</button>
      </div>`;
    }

    html += `</div></div>`;
  });

  if (!hasAny && curTab !== 'all') {
    html = '<div class="empty-filter">Không có mục nào ở bộ lọc này</div>';
  }

  area.innerHTML = html;
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ════════════════════════════════════════
   EVENT DELEGATION
════════════════════════════════════════ */
document.getElementById('scroll').addEventListener('click', async function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const sid = el.dataset.sid;
  const iid = el.dataset.iid;

  if (action === 'toggle') {
    if (e.target.closest('[data-noprop]') || e.target.closest('.idel')) return;
    const s = secs.find(x => x.id === sid);
    const item = s && s.items.find(x => x.id === iid);
    if (!item) return;
    item.done = !item.done;
    await saveToday(); render();
    const total = secs.reduce((a,s)=>a+s.items.length,0);
    const done = secs.reduce((a,s)=>a+s.items.filter(i=>i.done).length,0);
    if (done===total && total>0) showToast('🎉 Chuẩn bị hoàn tất!','ok');
  }
  else if (action === 'qty') {
    e.stopPropagation();
    const s = secs.find(x=>x.id===sid), item = s&&s.items.find(x=>x.id===iid);
    if (!item) return;
    item.qty = Math.max(1, item.qty + parseInt(el.dataset.d));
    await saveToday(); render();
  }
  else if (action === 'additem') {
    e.stopPropagation();
    const inp = document.querySelector(`.add-inp[data-sid="${sid}"]`);
    const name = (inp?inp.value:'').trim();
    if (!name) return;
    const s = secs.find(x=>x.id===sid);
    s.items.push({id:'x'+Date.now(),name,note:'',qty:1,done:false});
    await saveToday(); render();
    setTimeout(()=>{ const el2=document.querySelector(`.add-inp[data-sid="${sid}"]`); if(el2)el2.focus(); },60);
  }
  else if (action === 'delitem') {
    e.stopPropagation();
    const s = secs.find(x=>x.id===sid);
    if (s) s.items = s.items.filter(i=>i.id!==iid);
    await saveToday(); render();
  }
  else if (action === 'delsec') {
    e.stopPropagation();
    if (!confirm('Xoá danh mục "' + (secs.find(s=>s.id===sid)||{title:''}).title + '"?')) return;
    secs = secs.filter(s=>s.id!==sid);
    await saveToday(); render();
    showToast('Đã xoá danh mục','warn');
  }
});

document.getElementById('scroll').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const inp = e.target.closest('.add-inp');
  if (!inp) return;
  e.preventDefault();
  const sid = inp.dataset.sid;
  const name = inp.value.trim();
  if (!name) return;
  const s = secs.find(x=>x.id===sid);
  if (!s) return;
  s.items.push({id:'x'+Date.now(),name,note:'',qty:1,done:false});
  saveToday().then(()=>{
    render();
    setTimeout(()=>{ const el2=document.querySelector(`.add-inp[data-sid="${sid}"]`); if(el2)el2.focus(); },60);
  });
});

/* Tabs */
['all','pending','done'].forEach(tab => {
  document.getElementById('tab-'+tab).addEventListener('click', () => setTab(tab));
});
function setTab(tab) {
  curTab = tab;
  ['all','pending','done'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab' + (t===tab?' on':'');
  });
  render();
}

/* Reset */
document.getElementById('btn-reset').addEventListener('click', async () => {
  if (!confirm('Reset tất cả về chưa tick?\nDữ liệu hôm nay sẽ được lưu lại trong lịch sử.')) return;
  secs.forEach(s => s.items.forEach(i => i.done = false));
  await saveToday(); render();
  showToast('↺ Đã reset checklist','info');
});

document.getElementById('btn-open-sheet').addEventListener('click', openSheet);

/* ════════════════════════════════════════
   SHEET
════════════════════════════════════════ */
function openSheet() {
  buildEmojis();
  document.getElementById('overlay').classList.add('on');
  setTimeout(() => document.getElementById('cat-inp').focus(), 300);
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('on');
}

});
document.getElementById('sh-cancel').addEventListener('click', closeSheet);
document.getElementById('sh-ok').addEventListener('click', confirmCat);
document.getElementById('cat-inp').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();confirmCat();} });

function buildEmojis() {
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
    `<button class="eb${e===selEmoji?' on':''}" data-emoji="${e}">${e}</button>`
  ).join('');
}
document.getElementById('emoji-grid').addEventListener('click', function(e) {
  const btn = e.target.closest('.eb');
  if (!btn) return;
  selEmoji = btn.dataset.emoji;
  buildEmojis();
});
async function confirmCat() {
  const name = document.getElementById('cat-inp').value.trim();
  if (!name) { document.getElementById('cat-inp').focus(); return; }
  secs.push({ id:'cat'+Date.now(), icon:selEmoji, title:name, items:[] });
  document.getElementById('cat-inp').value = '';
  await saveToday(); render(); closeSheet();
  showToast('✅ Đã thêm "' + name + '"','ok');
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function goPage(page) {
  const home = document.getElementById('pg-home');
  const hist = document.getElementById('pg-hist');
  if (page === 'home') {
    home.style.display = 'flex';
    hist.style.display = 'none'; hist.classList.remove('on');
    document.getElementById('bn-home').className='bn on';
    document.getElementById('bn-hist').className='bn';
  } else {
    home.style.display = 'none';
    hist.style.display = 'flex'; hist.classList.add('on');
    document.getElementById('bn-home2').className='bn';
    document.getElementById('bn-hist2').className='bn on';
    renderHistory();
  }
}
document.getElementById('bn-home').addEventListener('click', ()=>goPage('home'));
document.getElementById('bn-hist').addEventListener('click', ()=>goPage('history'));
document.getElementById('bn-home2').addEventListener('click', ()=>goPage('home'));
document.getElementById('bn-hist2').addEventListener('click', ()=>goPage('history'));

/* ════════════════════════════════════════
   HISTORY
════════════════════════════════════════ */
async function renderHistory() {
  const area = document.getElementById('hist-area');
  area.innerHTML = '<div style="padding:28px;text-align:center;color:#484f58;font-size:13px;font-weight:600">Đang tải lịch sử...</div>';
  const all = await dbGetAll('history');
  if (!all || all.length === 0) {
    area.innerHTML = '<div class="empty"><div class="empty-ei">📅</div><h3>Chưa có lịch sử</h3><p>Dữ liệu được lưu tự động mỗi khi bạn tick thiết bị</p></div>';
    return;
  }
  all.sort((a,b) => b.date.localeCompare(a.date));

  let html = '';
  all.forEach((rec, idx) => {
    const total = rec.sections.reduce((a,s)=>a+s.items.length,0);
    const done = rec.sections.reduce((a,s)=>a+s.items.filter(i=>i.done).length,0);
    const pct = total ? Math.round(done/total*100) : 0;
    const isToday = rec.date === TODAY;
    const isFull = done === total && total > 0;

    // Format date properly
    const d = new Date(rec.date + 'T00:00:00');
    const weekdays = ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];
    const months = ['tháng 1','tháng 2','tháng 3','tháng 4','tháng 5','tháng 6','tháng 7','tháng 8','tháng 9','tháng 10','tháng 11','tháng 12'];
    const dateMain = isToday ? '📍 Hôm nay' : weekdays[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()];
    const dateSub = isToday ? d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}) : d.getFullYear() + '';

    html += `<div class="day-card">
      <div class="day-head" data-hidx="${idx}">
        <div class="day-dot${isToday?' today':isFull?' full':''}"></div>
        <div class="day-info">
          <div class="day-date-main">${dateMain}</div>
          <div class="day-date-sub">${dateSub} · ${rec.sections.reduce((a,s)=>a+s.items.length,0)} thiết bị</div>
        </div>
        <div class="day-right">
          <div class="day-pct${isFull?' done':''}">${pct}%</div>
          <div class="day-count">${done}/${total} đã tick</div>
        </div>
        <svg class="day-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="day-prog"><div class="day-prog-fill${isFull?' done':''}" style="width:${pct}%"></div></div>
      <div class="day-body" id="hbody-${idx}">`;

    rec.sections.forEach(sec => {
      const secDone = sec.items.filter(i=>i.done).length;
      html += `<div class="hsec">
        <div class="hsec-title">${sec.icon} ${esc(sec.title)} <span style="margin-left:auto;color:${secDone===sec.items.length&&sec.items.length>0?'var(--ok)':'var(--txf)'}">${secDone}/${sec.items.length}</span></div>`;
      sec.items.forEach(item => {
        html += `<div class="hitem">
          <div class="hchk"+(item.done?' ok':'')+">
            ${item.done?'<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>':''}
          </div>
          <span class="hitem-name">${esc(item.name)}</span>
          ${item.note?`<span class="hitem-note">${esc(item.note)}</span>`:''}
          <span class="hitem-qty">x${item.qty}</span>
        </div>`;
      });
      html += '</div>';
    });

    html += `</div></div>`;
  });

  area.innerHTML = html;

  area.addEventListener('click', function(e) {
    const head = e.target.closest('.day-head');
    if (!head) return;
    const idx = head.dataset.hidx;
    const body = document.getElementById('hbody-'+idx);
    const chev = head.querySelector('.day-chev');
    if (!body) return;
    const open = body.classList.toggle('open');
    if (chev) chev.classList.toggle('open', open);
  });
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
let _tt;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on ' + type;
  clearTimeout(_tt);
  _tt = setTimeout(() => { t.className = 'toast'; }, 2600);
}

/* ════════════════════════════════════════
   DATE / INSTALL
════════════════════════════════════════ */
function updateDate() {
  const d = new Date();
  const w = ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'][d.getDay()];
  document.getElementById('top-date').textContent = w + ', ' + d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
}

function checkInstall() {
  const wrap = document.getElementById('install-wrap');
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone && !sessionStorage.getItem('ib')) {
    wrap.innerHTML = `<div class="install-bar">
      <span style="font-size:20px;flex-shrink:0;line-height:1.4">📲</span>
      <p>Thêm vào màn hình chính: nhấn <strong>Chia sẻ ↑</strong> rồi chọn <strong>"Thêm vào Màn hình chính"</strong></p>
      <button class="ib-close" onclick="this.closest('.install-bar').remove();sessionStorage.setItem('ib','1')">✕</button>
    </div>`;
  }
}

openDB().then(async () => {
